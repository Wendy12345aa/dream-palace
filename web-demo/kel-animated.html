<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Palace - Kel Animated Portrait</title>
    <style>
      :root {
        --gold: #d8ad59;
        --emerald: #7bcf9d;
        --motion: 0.35;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 42% 18%, rgba(123, 207, 157, 0.22), transparent 28%),
          radial-gradient(circle at 60% 72%, rgba(216, 173, 89, 0.18), transparent 38%),
          linear-gradient(180deg, #20241d, #08090d 78%);
        color: #f5eee2;
        font-family: Inter, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      main {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .portrait {
        position: relative;
        width: min(78vw, 720px);
        aspect-ratio: 1024 / 1536;
        filter: drop-shadow(0 24px 30px rgba(0, 0, 0, 0.45));
        animation: hover 8s ease-in-out infinite;
      }

      .portrait img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        pointer-events: none;
      }

      .base {
        animation: breathe 6.4s ease-in-out infinite;
      }

      .hair-front {
        animation: hairFront 5.2s ease-in-out infinite;
      }

      .sleeve {
        animation: sleeve 6.8s ease-in-out infinite;
      }

      .lantern {
        mix-blend-mode: screen;
        opacity: 0.34;
        filter: drop-shadow(0 0 14px rgba(123, 207, 157, 0.55));
        animation: lanternPulse 4.4s ease-in-out infinite;
      }

      .caption {
        position: absolute;
        left: 28px;
        bottom: 24px;
        color: rgba(245, 238, 226, 0.72);
        letter-spacing: 0.08em;
      }

      .caption strong {
        display: block;
        color: var(--emerald);
        font-family: Georgia, "Songti SC", serif;
        font-size: 24px;
        font-weight: 500;
        letter-spacing: 0.03em;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.001, 1.002); }
      }

      @keyframes hairFront {
        0%, 100% { transform: translateX(0) rotate(0); }
        54% { transform: translateX(calc(var(--motion) * 1.6px)) rotate(calc(var(--motion) * 0.14deg)); }
      }

      @keyframes sleeve {
        0%, 100% { transform: translateX(0) rotate(0); }
        50% { transform: translateX(calc(var(--motion) * 1.4px)) rotate(calc(var(--motion) * 0.12deg)); }
      }

      @keyframes lanternPulse {
        0%, 100% { opacity: 0.24; transform: scale(1); }
        50% { opacity: 0.42; transform: scale(1.006); }
      }

      @keyframes hover {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-0.5px); }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="portrait" aria-label="Kel animated portrait preview">
        <img class="base" src="assets/portraits/kel/animated/pt_kel_base.webp" alt="Kel 动态立绘基础层" />
        <img class="sleeve" src="assets/portraits/kel/animated/anim_kel_sleeve.webp" alt="" aria-hidden="true" />
        <img class="hair-front" src="assets/portraits/kel/animated/anim_kel_hair_front.webp" alt="" aria-hidden="true" />
        <img class="lantern" src="assets/portraits/kel/animated/anim_kel_lantern_glow.webp" alt="" aria-hidden="true" />
      </div>
      <p class="caption"><strong>Kel · Engineering Companion</strong>Lightweight web layers for Dream Palace</p>
    </main>
  </body>
</html>
