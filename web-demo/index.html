<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#171714" />
    <title>Dream Palace - The First Morning Court</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Dream Palace web demo">
      <section class="language-gate" id="languageGate" aria-labelledby="languageTitle">
        <div class="language-gate-inner">
          <p>Dream Palace</p>
          <h1 id="languageTitle">Choose your language</h1>
          <span>选择语言</span>
          <div class="language-gate-options">
            <button type="button" data-language="zh">
              <strong>中文</strong>
              <small>进入第一次早朝</small>
            </button>
            <button type="button" data-language="en">
              <strong>English</strong>
              <small>Enter the First Morning Court</small>
            </button>
          </div>
        </div>
      </section>

      <section class="opening" id="openingSequence" aria-label="Opening sequence" hidden>
        <figure class="opening-frame">
          <img id="openingImage" alt="" />
          <div class="opening-shade" aria-hidden="true"></div>
          <figcaption class="opening-copy">
            <p id="openingKicker">Before the first bell</p>
            <h1 id="openingTitle">The kingdom was already awake.</h1>
          </figcaption>
        </figure>

        <div class="opening-controls">
          <div class="opening-progress" id="openingProgress" aria-label="Opening progress"></div>
          <div class="opening-actions">
            <div class="language-switch" aria-label="Language">
              <button type="button" data-language="zh">中</button>
              <button type="button" data-language="en">EN</button>
            </div>
            <button class="text-command" id="skipOpening" type="button" data-i18n="skipOpening">Skip opening</button>
          </div>
        </div>
      </section>

      <section class="court-scene" id="courtScene" aria-label="Morning Court" hidden>
        <div class="scene-image" aria-hidden="true"></div>
        <div class="scene-light" aria-hidden="true"></div>
        <div class="scene-vignette" aria-hidden="true"></div>

        <header class="court-header">
          <div class="wordmark">
            <span>Dream Palace</span>
            <strong data-i18n="demoTitle">The First Morning Court</strong>
          </div>
          <div class="court-tools">
            <div class="language-switch court-language" aria-label="Language">
              <button type="button" data-language="zh">中</button>
              <button type="button" data-language="en">EN</button>
            </div>
            <div class="scene-time" aria-label="Current time and scene">
              <span id="dayChip">Day 1 - Morning</span>
              <strong id="phaseChip">Morning Court</strong>
            </div>
          </div>
        </header>

        <div class="companion-stage" id="companionStage" aria-hidden="true">
          <figure class="court-actor actor-mp" data-companion="mp">
            <div class="portrait-rig portrait-rig-mp">
              <img class="portrait-layer portrait-base" src="assets/portraits/mp/animated/pt_mp_base.webp" alt="" />
              <img class="portrait-layer portrait-hair-back" src="assets/portraits/mp/animated/anim_mp_hair_back.webp" alt="" />
              <img class="portrait-layer portrait-sleeve" src="assets/portraits/mp/animated/anim_mp_sleeve.webp" alt="" />
              <img class="portrait-layer portrait-hair-front" src="assets/portraits/mp/animated/anim_mp_hair_front.webp" alt="" />
              <img class="portrait-layer portrait-blink" src="assets/portraits/mp/animated/anim_mp_blink_closed.webp" alt="" />
            </div>
          </figure>

          <figure class="court-actor actor-kel" data-companion="kel">
            <div class="portrait-rig portrait-rig-kel">
              <img class="portrait-layer portrait-base" src="assets/portraits/kel/animated/pt_kel_base.webp" alt="" />
              <img class="portrait-layer portrait-sleeve" src="assets/portraits/kel/animated/anim_kel_sleeve.webp" alt="" />
              <img class="portrait-layer portrait-hair-front" src="assets/portraits/kel/animated/anim_kel_hair_front.webp" alt="" />
              <img class="portrait-layer portrait-lantern" src="assets/portraits/kel/animated/anim_kel_lantern_glow.webp" alt="" />
              <img class="portrait-layer portrait-blink" src="assets/portraits/kel/animated/anim_kel_blink_closed.webp" alt="" />
            </div>
          </figure>

          <figure class="court-actor actor-tab" data-companion="tab">
            <div class="portrait-rig portrait-rig-tab">
              <img class="portrait-layer portrait-base" src="assets/portraits/tab/pt_tab_idle_preview.png" alt="" />
              <span class="tab-review-glint"></span>
            </div>
          </figure>

          <figure class="court-actor actor-cx" data-companion="cx">
            <div class="cx-silhouette">
              <img
                class="cx-silhouette-art"
                src="assets/portraits/cx/pt_cx_teaser_silhouette.png"
                alt=""
              />
              <span class="cx-glasses-glint" aria-hidden="true"></span>
            </div>
          </figure>
        </div>

        <section class="northbridge-focus" id="northbridgeFocus" aria-label="Northbridge status">
          <span class="focus-pulse" aria-hidden="true"></span>
          <div>
            <strong data-i18n="northbridge">Northbridge</strong>
            <span id="bridgeStatus">Old supply bridge damaged</span>
          </div>
        </section>

        <section class="kingdom-answer" id="kingdomAnswer" aria-live="polite">
          <div class="answer-miniature" aria-hidden="true">
            <div class="answer-river"></div>
            <div class="answer-bank answer-bank-left"></div>
            <div class="answer-bank answer-bank-right"></div>
            <div class="answer-bridge">
              <i class="bridge-beam beam-one"></i>
              <i class="bridge-beam beam-two"></i>
              <i class="bridge-beam beam-three"></i>
              <i class="bridge-beam beam-four"></i>
            </div>
            <div class="grain-route">
              <i class="grain-cart cart-one"></i>
              <i class="grain-cart cart-two"></i>
            </div>
            <div class="work-lights">
              <i></i><i></i><i></i>
            </div>
            <div class="audit-route">
              <i class="inspector inspector-one"></i>
              <i class="inspector inspector-two"></i>
              <i class="inspection-line"></i>
            </div>
            <div class="audit-standard">
              <i></i>
            </div>
          </div>
          <div class="answer-copy">
            <span id="answerKicker"></span>
            <strong id="answerTitle"></strong>
            <small id="answerDetail"></small>
          </div>
        </section>

        <aside class="ledger-slip" id="ledgerSlip" aria-label="Treasury note">
          <span data-i18n="emergencyReserve">Emergency reserve</span>
          <strong id="reserveStatus">Sealed</strong>
          <small id="villageStatus">Northbridge is waiting for the court's first decision.</small>
        </aside>

        <div class="consequence-toast" id="consequenceToast" role="status" aria-live="polite"></div>

        <section class="dialogue-layer" aria-label="Dialogue">
          <div class="speaker-mark" id="speakerToken">MP</div>
          <div class="dialogue-content">
            <div class="speaker-heading">
              <p class="speaker-name" id="speakerName">MP</p>
              <p class="speaker-role" id="speakerRole">Treasury and responsibility</p>
            </div>
            <p class="dialogue-text" id="dialogueText" aria-live="polite"></p>
            <div class="choice-row" id="choiceRow"></div>
          </div>
          <button class="continue-button" id="continueButton" type="button" aria-label="Continue dialogue">
            <span data-i18n="continue">Continue</span>
            <b aria-hidden="true">&gt;</b>
          </button>
        </section>
      </section>
    </main>

    <script src="src/demoData.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
